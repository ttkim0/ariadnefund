# Ariadne Labs — multi-city configuration
#
# One entry per city we trade.  All scripts take --city <slug> and look up the
# rest here.  The slug doubles as a filename prefix (data/{slug}_hourly.parquet,
# models/{slug}/qmodel_*.joblib, etc.) so do NOT change a slug after training.
#
# Field reference:
#   slug:           short stable identifier, [a-z0-9_]+
#   name:           human display
#   icao:           4-letter ICAO airport code (NOAA + NWS METAR feed)
#   nws_office:     issuing forecast office (informational; not used by code)
#   zip:            ZIP for the airport (informational)
#   timezone:       IANA timezone name — Kalshi settlement time and the canonical
#                   "local time" for this city's daily HIGH/LOW
#   lcd_raw:        path to the raw NOAA LCD CSV (under data/lcd_raw/) — these
#                   files are gitignored because they total ~2 GB
#   kalshi:
#     high_series:  Kalshi series ticker for daily HIGH (null if Kalshi has no HIGH market)
#     low_series:   Kalshi series ticker for daily LOW  (null if Kalshi has no LOW market)
#   climatology:    informational seasonal anchor — month -> typical [low, high] in °F.
#                   Used only as a sanity-check: model predictions outside this band
#                   throw an audit warning.

cities:

  - slug: sfo
    name: San Francisco
    icao: KSFO
    nws_office: KMTR
    zip: "94128"
    timezone: America/Los_Angeles
    lcd_raw: data/lcd_raw/sfo.csv
    kalshi:
      high_series: KXHIGHTSFO
      low_series:  KXLOWTSFO
    climatology:
      jan: [42, 58]
      apr: [48, 64]
      jul: [54, 68]
      oct: [52, 70]

  - slug: nyc
    name: New York (Central Park)
    icao: KNYC
    nws_office: KOKX
    zip: "10024"
    timezone: America/New_York
    lcd_raw: data/lcd_raw/nyc.csv
    # NYC HIGH uses an irregular ticker (KXHIGHNY, no "T") — every other city
    # uses KXHIGHT*.  Discovered post-deployment.
    kalshi:
      high_series: KXHIGHNY
      low_series:  KXLOWTNYC
    climatology:
      jan: [27, 39]
      apr: [44, 62]
      jul: [69, 85]
      oct: [49, 67]

  - slug: lax
    name: Los Angeles
    icao: KLAX
    nws_office: KLOX
    zip: "90045"
    timezone: America/Los_Angeles
    lcd_raw: data/lcd_raw/lax.csv
    # LAX uses the no-T convention for HIGH (Kalshi inconsistency).
    kalshi:
      high_series: KXHIGHLAX
      low_series:  KXLOWTLAX
    climatology:
      jan: [50, 65]
      apr: [55, 68]
      jul: [64, 76]
      oct: [60, 76]

